
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ángel Guardian - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', monospace;
            background: #0a0e1a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: center;
        }
        .header h1 { font-size: 2.2em; }
        .header h1 span { color: #00d4ff; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2a2f3e;
        }
        .stat-card .value { font-size: 2.5em; font-weight: bold; color: #00d4ff; }
        .stat-card h3 { color: #8892b0; margin-bottom: 10px; }
        .logs-container {
            background: #1a1f2e;
            border-radius: 12px;
            border: 1px solid #2a2f3e;
            overflow: hidden;
        }
        .logs-header {
            padding: 15px 20px;
            background: #0f141f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #2a2f3e; }
        th { background: #0f141f; color: #00d4ff; }
        tr:hover { background: #1f2538; }
        .badge-critical { background: #d90429; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75em; }
        .badge-suspicious { background: #f77f00; color: black; padding: 4px 12px; border-radius: 20px; font-size: 0.75em; }
        .badge-safe { background: #06d6a0; color: black; padding: 4px 12px; border-radius: 20px; font-size: 0.75em; }
        .refresh-btn {
            background: #00d4ff;
            color: #0a0e1a;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .footer { text-align: center; margin-top: 25px; padding: 15px; color: #5a6080; }
        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #06d6a0;
            border-radius: 50%;
            animation: pulse 1s infinite;
            margin-right: 8px;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👼 <span>ÁNGEL GUARDIAN</span></h1>
            <p>Centro de operaciones - Monitoreo de seguridad</p>
            <p><small><span class="live-indicator"></span> Actualizado: <span id="last-update">-</span></small></p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><h3>📊 Total Logs</h3><div class="value" id="total-logs">-</div></div>
            <div class="stat-card"><h3>🔥 Críticos</h3><div class="value" id="critical-logs" style="color:#d90429;">-</div></div>
            <div class="stat-card"><h3>⚠️ Sospechosos</h3><div class="value" id="suspicious-logs" style="color:#f77f00;">-</div></div>
            <div class="stat-card"><h3>✅ Seguros</h3><div class="value" id="safe-logs" style="color:#06d6a0;">-</div></div>
        </div>
        
        <div class="logs-container">
            <div class="logs-header">
                <h2>📋 Eventos de Seguridad</h2>
                <button class="refresh-btn" onclick="cargarDatos()">🔄 Actualizar</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>#</th><th>Timestamp</th><th>IP/Fuente</th><th>Mensaje</th><th>Categoría</th></tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="5" style="text-align: center;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="footer">🛡️ Ángel Guardian - Motor Onion en Rust | Protegiendo tu red 24/7</div>
    </div>

    <script>
        async function cargarDatos() {
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('total-logs').textContent = stats.total_logs || 0;
                document.getElementById('critical-logs').textContent = stats.criticos || 0;
                document.getElementById('suspicious-logs').textContent = stats.sospechosos || 0;
                document.getElementById('safe-logs').textContent = stats.seguros || 0;
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                
                const logsRes = await fetch('/api/logs');
                const logs = await logsRes.json();
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = '';
                logs.forEach((log, idx) => {
                    let badgeClass = 'badge-safe';
                    let badgeText = 'SEGURO';
                    if (log.categoria === 'CRITICO') {
                        badgeClass = 'badge-critical';
                        badgeText = '🔥 CRITICO';
                    } else if (log.categoria === 'SOSPECHOSO') {
                        badgeClass = 'badge-suspicious';
                        badgeText = '⚠️ SOSPECHOSO';
                    }
                    tbody.innerHTML += `<tr>
                        <td>${idx + 1}</td>
                        <td>${log.timestamp || '-'}</td>
                        <td>${log.ip || 'SISTEMA'}</td>
                        <td>${log.mensaje || '-'}</td>
                        <td><span class="${badgeClass}">${badgeText}</span></td>
                    </tr>`;
                });
            } catch(e) {
                console.error(e);
                document.getElementById('logs-body').innerHTML = '<tr><td colspan="5" style="text-align:center; color:#d90429;">Error cargando datos</td></tr>';
            }
        }
        cargarDatos();
        setInterval(cargarDatos, 5000);
    </script>
</body>
</html>
