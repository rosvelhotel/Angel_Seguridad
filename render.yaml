services:
  - type: web
    name: angel-guardian-dashboard
    env: rust
    # 🟢 El secreto: Instalamos las dependencias de Python ANTES de compilar Rust
    buildCommand: "pip install librouteros ollama python-dotenv && cargo build --release"
    startCommand: "./target/release/angel_server"
    envVars:
      - key: RUST_LOG
        value: info
      # 🛡️ Pasamos tus credenciales del MikroTik al entorno unificado
      - key: MIKROTIK_IP
        sync: false
      - key: MIKROTIK_USER
        sync: false
      - key: MIKROTIK_PASS
        sync: false
      - key: MODELO_IA
        value: angel_guardian_mistral
