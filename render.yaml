services:
  - type: web
    name: angel-guardian-dashboard
    env: rust
    # 🟢 AGREGAMOS EL BASE DE PYTHON ADEMÁS DE RUST
    plan: free
    buildCommand: "cargo build --release"
    startCommand: "pip install --target=.lib librouteros ollama python-dotenv && PYTHONPATH=.lib ./target/release/angel_server"
    envVars:
      - key: RUST_LOG
        value: info
      - key: MIKROTIK_IP
        sync: false
      - key: MIKROTIK_USER
        sync: false
      - key: MIKROTIK_PASS
        sync: false
      - key: MODELO_IA
        value: angel_guardian_mistral
