# render.yaml - Configuración de despliegue en Render

services:
  # Servicio 1: Agente Ángel Guardian (Python)
  - type: worker
    name: angel-guardian-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python angel_guardian.py --daemon 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MIKROTIK_IP
        sync: false
      - key: MIKROTIK_USER
        sync: false
      - key: MIKROTIK_PASS
        sync: false
      - key: MODELO_IA
        value: angel_guardian_mistral
    healthCheckPath: /health

  # Servicio 2: Dashboard (Rust)
  - type: web
    name: angel-guardian-dashboard
    env: rust
    buildCommand: cargo build --release
    startCommand: ./target/release/angel_server
    envVars:
      - key: RUST_LOG
        value: info
    healthCheckPath: /
